    *{box-sizing:border-box} body{margin:0;font-family:'DM Sans',sans-serif;background:#f6f3ed;color:#172033} button,input,select,textarea{font-family:inherit} button{cursor:pointer;transition:.12s} button:hover{transform:translateY(-1px);opacity:.94}.app{display:flex;min-height:100vh}.side{width:280px;background:#172033;color:white;padding:22px;position:fixed;left:0;top:0;bottom:0;overflow:auto}.main{margin-left:280px;flex:1;padding:28px}.logo{width:46px;height:46px;border-radius:16px;background:#d7e5dd;color:#172033;display:flex;align-items:center;justify-content:center;font-weight:900;margin-bottom:12px}.nav button{width:100%;display:flex;align-items:center;gap:10px;border:0;border-radius:18px;padding:12px 14px;background:transparent;color:#cbd5e1;font-weight:800;text-align:left;margin:5px 0}.nav button.active{background:white;color:#172033}.beta{margin-top:24px;background:rgba(255,255,255,.1);border-radius:24px;padding:16px;color:#dbe5e0;font-size:14px;line-height:1.55}h1,h2,h3,p{margin-top:0}.top{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:24px}.eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:900;color:#64748b}.title{font-size:38px;line-height:1;font-weight:900;color:#172033;margin:6px 0 0}.search{display:flex;align-items:center;background:white;border:1px solid #e2e8f0;border-radius:18px;padding:12px 16px;color:#64748b;box-shadow:0 2px 10px rgba(15,23,42,.04)}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:22px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:white;border:1px solid #e2e8f0;border-radius:28px;padding:20px;box-shadow:0 2px 12px rgba(15,23,42,.05);margin-bottom:12px}.statLabel{font-size:14px;font-weight:800;color:#64748b}.statNum{font-size:34px;font-weight:900;margin-top:8px}.muted{color:#64748b;font-size:14px}.pill{display:inline-flex;border-radius:999px;border:1px sol     @media(max-width:900px){.side{display:none}.main{margin-left:0;padding:16px}.grid4,.grid2,.grid3,.formgrid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.mobileNav{display:flex;gap:8px;overflow:auto;margin-bottom:16px}.mobileNav button{white-space:nowrap;border:1px solid #e2e8f0;border-radius:999px;background:white;padding:8px 12px;font-weight:800}}

<script type="text/babel">

const headers={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'};
async function sbGet(table){try{const r=await fetch(`${SB_URL}/rest/v1/${table}?select=*`,{headers}); const d=await r.json(); return Array.isArray(d)?d.map(x=>x.data):[]}catch(e){console.error(e);return[]}}
async function sbSave(table,items){try{await fetch(`${SB_URL}/rest/v1/${table}`,{method:'DELETE',headers}); if(items.length) await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=id`,{method:'POST',headers:{...headers,Prefer:'resolution=merge-duplicates'},body:JSON.stringify(items.map(i=>({id:i.id,data:i})))})}catch(e){console.error(e);alert('Save issue: '+e.message)}}
function useDB(table,seed){const [data,setData]=useState(seed); const [loaded,setLoaded]=useState(false); useEffect(()=>{sbGet(table).then(d=>{if(d.length) setData(d); else sbSave(table,seed); setLoaded(true)})},[table]); const save=async(next)=>{setData(next); await sbSave(table,next)}; return [data,save,loaded]}
const seedCustomers=[{id:'1',name:'Sarah Lee',phone:'(214) 555-0184',email:'sarahlee@email.com',address:'1428 Willow Creek Dr, Dallas, TX',equipment:'Carrier 4 Ton Unit · Installed 2021',tags:['Maintenance Plan','Priority'],notes:'Prefers morning appointments.'},{id:'2',name:'John Martinez',phone:'(817) 555-0122',email:'johnm@email.com',address:'8804 Meadow Lane, Fort Worth, TX',equipment:'Trane Furnace + AC · Installed 2019',tags:['Past Customer','Tune-Up Due'],notes:'Interested in maintenance plan.'},{id:'3',name:'Ramirez Dental Group',phone:'(972) 555-0198',email:'office@ramirezdental.com',address:'510 Preston Rd, Plano, TX',equipment:'Commercial Rooftop Unit',tags:['Commercial','Invoice Open'],notes:'Call office manager before arrival.'}];

const seedJobs=[{id:'101',customerId:'1',title:'AC Not Cooling',stage:'Scheduled',techId:'1',time:'Today · 10:30 AM',scheduled:'2026-05-27',notes:'Check refrigerant level, filter, and thermostat settings.',money:'$185 diagnostic',clientPrice:185,techHours:2,materials:0},{id:'102',customerId:'2',title:'Summer Tune-Up',stage:'Follow-Up Needed',techId:'3',time:'Due this week',scheduled:'2026-05-30',notes:'Customer is due for seasonal AC maintenance reminder.',money:'$129 service special',clientPrice:129,techHours:1.5,materials:8},{id:'103',customerId:'3',title:'Invoice Reminder',stage:'Invoice Sent',techId:'',time:'3 days overdue',scheduled:'2026-05-23',notes:'Send polite payment reminder for completed commercial service.',money:'$740 outstanding',clientPrice:740,techHours:0,materials:0},{id:'104',customerId:'1',title:'Estimate Follow-Up',stage:'Estimate Sent',techId:'',time:'Sent 4 days ago',scheduled:'2026-05-24',notes:'Follow up on compressor replacement estimate.',money:'$2,850 estimate',clientPrice:2850,techHours:5,materials:1600}];

const seedCampaigns=[{id:'c1',title:'Summer Cooling Reminder',audience:'Maintenance Customers',template:'Is your AC ready for Texas heat? Schedule your seasonal tune-up before the busiest weeks hit.'},{id:'c2',title:'Spring HVAC Prep',audience:'Past Customers',template:'Spring is a good time to check filters, airflow, thermostat settings, and system performance.'},{id:'c3',title:'Winter Furnace Check',audience:'All Customers',template:'Before the cold hits, schedule your furnace safety and performance check.'},{id:'c4',title:'Holiday Thank You',audience:'All Customers',template:'Thank you for trusting our team this year. We appreciate your business and referrals.'}];
const aiExample={raw:'upstairs not cooling. coil is dirty bad. filter clogged. refrigerant looks low. system running but not keeping up. told customer probably needs coil clean and leak search before adding freon.',summary:'System inspection found reduced cooling performance upstairs. The evaporator coil appears heavily impacted, the filter is clogged, and refrigerant levels appear low. The system is currently running but struggling to maintain temperature.',scope:['Replace clogged air filter','Clean evaporator coil','Perform refrigerant leak search','Recharge refrigerant only if leak findings support it','Test system performance after service'],quote:'$450–$850 estimated range depending on leak search findings and refrigerant needs'};
const stages=['New Lead','Estimate Sent','Scheduled','Technician En Route','Completed','Invoice Sent','Follow-Up Needed'];
const cls=s=>s==='Scheduled'?'blue':s==='Follow-Up Needed'?'amber':s==='Invoice Sent'?'rose':s==='Estimate Sent'?'slate':'green';
function Pill({children,kind}){return <span className={'pill '+(kind||'slate')}>{children}</span>}
function Card({children,cn=''}){return <div className={'card '+cn}>{children}</div>}
function mapLink(address){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(address||'')}
function profit(job,techs){const t=techs.find(x=>x.id===job.techId); return Math.max(0,(+job.clientPrice||0)-((+t?.hourly||0)*(+job.techHours||0))-(+job.materials||0))}
function Modal({title,onClose,children}){return <div className="modalbg"><div className="modal"><div className="split"><h2>{title}</h2><button className="btn btn3" onClick={onClose}>Close</button></div>{children}</div></div>}
function App(){
 const [tab,setTab]=useState('Dashboard');
 const [customers,setCustomers,cL]=useDB('localops_customers',seedCustomers); const [jobs,setJobs,jL]=useDB('localops_jobs',seedJobs); const [techs,setTechs,tL]=useDB('localops_technicians',seedTechs); const [followups,setFollowups,fL]=useDB('localops_followups',seedFollowups); const [campaigns,setCampaigns,caL]=useDB('localops_campaigns',seedCampaigns);
 const [sel,setSel]=useState('1'); const [modal,setModal]=useState(null); const [form,setForm]=useState({}); const loaded=cL&&jL&&tL&&fL&&caL;
 if(!loaded) return <div style={{padding:40}}>Loading LocalOps...</div>;
 const nav=['Dashboard','Customers','Jobs','Technicians','Schedule','Follow-Ups','Marketing','AI Scope']; const selected=customers.find(c=>c.id===sel)||customers[0]; const cjobs=jobs.filter(j=>j.customerId===selected?.id); const todayJobs=jobs.filter(j=>j.time?.includes('Today')); const follow=jobs.filter(j=>['Follow-Up Needed','Estimate Sent','Invoice Sent'].includes(j.stage));
 const saveCustomer=()=>{let next; if(form.id) next=customers.map(c=>c.id===form.id?form:c); else next=[...customers,{...form,id:Date.now().toString(),tags:(form.tagsText||'').split(',').map(x=>x.trim()).filter(Boolean)}]; setCustomers(next); setModal(null)};
 const saveTech=()=>{let next; if(form.id) next=techs.map(t=>t.id===form.id?form:t); else next=[...techs,{...form,id:Date.now().toString(),hourly:+form.hourly||0}]; setTechs(next); setModal(null)};
 const saveJob=()=>{let next; const clean={...form,clientPrice:+form.clientPrice||0,techHours:+form.techHours||0,materials:+form.materials||0}; if(form.id) next=jobs.map(j=>j.id===form.id?clean:j); else next=[...jobs,{...clean,id:Date.now().toString()}]; setJobs(next); setModal(null)};
 const dispatch=(job)=>{const c=customers.find(x=>x.id===job.customerId); const t=techs.find(x=>x.id===job.techId); alert('Demo dispatch email ready for '+(t?.name||'technician')+'\n\nJob: '+job.title+'\nCustomer: '+(c?.name||'')+'\nMap: '+mapLink(c?.address));};
 const sendCampaign=(camp)=>alert('Demo email campaign preview: '+camp.title+'\nAudience: '+camp.audience+'\n\nIn production this can send through Resend.');
 return <div className="app"><aside className="side"><div className="logo">NB</div><h2>Network Boss</h2><p style={{color:'#cbd5e1'}}>LocalOps HVAC Demo</p><div className="nav">{nav.map(n=><button key={n} className={tab===n?'active':''} onClick={()=>setTab(n)}>{n}</button>)}</div><div className="beta"><b>Beta Focus</b><br/>A simple operating system for HVAC offices: customers, jobs, technicians, dispatch, follow-ups, newsletters, and AI scope examples.</div></aside><main className="main"><div className="mobileNav">{nav.map(n=><button key={n} onClick={()=>setTab(n)}>{n}</button>)}</div><div className="top"><div><div className="eyebrow">Summit Air & Heating</div><div className="title">{tab}</div></div><div className="search">Search customers, jobs, invoices...</div></div>
 {tab==='Dashboard'&&<><div className="grid4"><Card><div className="statLabel">Today’s Service Calls</div><div className="statNum">{todayJobs.length}</div><div className="muted">Ready for dispatch</div></Card><Card><div className="statLabel">Follow-Ups Needed</div><div className="statNum">{follow.length}</div><div className="muted">Estimates, invoices, reminders</div></Card><Card><div className="statLabel">Maintenance Due</div><div className="statNum">8</div><div className="muted">Seasonal callbacks</div></Card><Card><div className="statLabel">Outstanding Invoices</div><div className="statNum">$740</div><div className="muted">1 reminder ready</div></Card></div><br/><div className="grid2"><Card><div className="split"><h3>Today’s Schedule</h3><button className="btn" onClick={()=>{setForm({stage:'Scheduled',customerId:customers[0]?.id,techId:techs[0]?.id});setModal('job')}}>+ New Job</button></div>{jobs.slice(0,3).map(job=>{const c=customers.find(x=>x.id===job.customerId); const t=techs.find(x=>x.id===job.techId); return <div className="jobrow" key={job.id}><div className="split"><div><b>{job.title}</b> <Pill kind={cls(job.stage)}>{job.stage}</Pill><div className="muted">{c?.name} · {job.time}</div><div className="muted">Assigned: {t?.name||'Office'}</div></div><div className="actions"><a className="btn btn3" href={mapLink(c?.address)} target="_blank">Map</a><button className="btn btn2" onClick={()=>dispatch(job)}>Email Tech</button></div></div></div>})}</Card><Card><h3>Office Follow-Up Plan</h3>{follow.map(job=>{const c=customers.find(x=>x.id===job.customerId); return <div className="jobrow" key={job.id}><b>{job.title}</b><div className="muted">{c?.name} · {job.time}</div><div className="muted">Suggested: {job.stage==='Invoice Sent'?'send payment reminder':job.stage==='Estimate Sent'?'send estimate follow-up':'send seasonal maintenance email'}.</div></div>})}</Card></div></>}
 {tab==='Customers'&&<div className="grid2"><Card><div className="split"><h3>Customers</h3><button className="btn" onClick={()=>{setForm({name:'',tagsText:''});setModal('customer')}}>+</button></div>{customers.map(c=><button key={c.id} className={'listbtn '+(sel===c.id?'active':'')} onClick={()=>setSel(c.id)}><b>{c.name}</b><div className="muted">{c.address}</div><div style={{marginTop:8}}>{(c.tags||[]).map(tag=><Pill key={tag}>{tag}</Pill>)}</div></button>)}</Card><Card><div className="split"><div><h2>{selected?.name}</h2><div className="muted">{selected?.phone} · {selected?.email}</div><div className="muted">{selected?.address}</div></div><button className="btn btn2" onClick={()=>{setForm({customerId:selected?.id,stage:'Scheduled'});setModal('job')}}>Create Job</button></div><div className="jobrow"><div className="eyebrow">Equipment</div><b>{selected?.equipment}</b></div><h3>Jobs Under This Customer</h3>{cjobs.map(job=><div className="jobrow" key={job.id}><div className="split"><b>• {job.title}</b><Pill kind={cls(job.stage)}>{job.stage}</Pill></div><div className="muted">{job.notes}</div></div>)}</Card></div>}
 {tab==='Jobs'&&<div>{jobs.map(job=>{const c=customers.find(x=>x.id===job.customerId); return <Card key={job.id}><div className="split"><div><h3>{job.title} <Pill kind={cls(job.stage)}>{job.stage}</Pill></h3><div className="muted">Customer: <b>{c?.name}</b> · {job.money}</div><div className="muted">{c?.address}</div><div className="muted"><b>Admin-only profit:</b> ${profit(job,techs).toFixed(0)} estimated</div></div><div className="actions"><a className="btn btn3" href={mapLink(c?.address)} target="_blank">Map Link</a><button className="btn btn2" onClick={()=>dispatch(job)}>Send Dispatch</button><button className="btn" onClick={()=>{setForm(job);setModal('job')}}>Edit</button></div></div></Card>})}<button className="btn" onClick={()=>{setForm({customerId:customers[0]?.id,stage:'New Lead'});setModal('job')}}>+ Add Job</button></div>}
 {tab==='Technicians'&&<><div className="grid3">{techs.map(tech=><Card key={tech.id}><div className="split"><div><h3>{tech.name}</h3><div className="muted">{tech.specialty}</div></div><Pill kind={tech.status==='Available'?'green':'blue'}>{tech.status}</Pill></div><p className="muted">{tech.phone}<br/>{tech.email}<br/><b>Area:</b> {tech.area}<br/><b>Admin hourly cost:</b> ${tech.hourly}/hr</p><button className="btn btn2" onClick={()=>{setForm(tech);setModal('tech')}}>Edit Tech</button></Card>)}</div><br/><button className="btn" onClick={()=>{setForm({status:'Available'});setModal('tech')}}>+ Add Technician</button></>}
 {tab==='Marketing'&&<div className="grid2"><Card><h3>Premade HVAC Campaigns</h3><p className="muted">Click, edit, and send to selected customer lists.</p>{campaigns.map(c=><button className="listbtn" key={c.id} onClick={()=>sendCampaign(c)}><b>{c.title}</b><div className="muted">{c.audience}</div></button>)}</Card><Card><div className="eyebrow">Summer Cooling Reminder</div><h2>Is your AC ready for Texas heat?</h2><p className="muted" style={{fontSize:16,lineHeight:1.7}}>Schedule your seasonal tune-up before the busiest weeks hit. We’ll check filters, refrigerant, airflow, thermostat settings, and system performance.</p><button className="btn" onClick={()=>sendCampaign(campaigns[0])}>Send Demo Campaign</button></Card></div>}
 {tab==='AI Scope'&&<div className="grid2"><Card><div className="eyebrow">Field Tech Notes</div><h2>Messy notes in</h2><div className="jobrow" style={{fontSize:16,lineHeight:1.7}}>{aiExample.raw}</div></Card><Card><div className="eyebrow">Static AI Scope Assistant</div><h2>Clean scope & quote out</h2><div className="jobrow"><b>Customer-Friendly Summary</b><p className="muted">{aiExample.summary}</p></div><div className="jobrow"><b>Recommended Scope</b><ul>{aiExample.scope.map(s=><li key={s}>{s}</li>)}</ul></div><div className="jobrow" style={{background:'#172033',color:'white'}}><b>Suggested Quote Range</b><h2 style={{color:'white'}}>{aiExample.quote}</h2></div></Card></div>}
 {(tab==='Schedule'||tab==='Follow-Ups')&&<Card><h2>{tab==='Schedule'?'Daily route and technician schedule':'Follow-up command center'}</h2><p className="muted">This demo area shows scheduled jobs, reminders, route links, customer follow-up actions, and service call planning.</p>{followups.map(f=>{const c=customers.find(x=>x.id===f.customerId);return <div className="jobrow" key={f.id}><b>{f.type}</b><div className="muted">{c?.name} · {f.due}</div><div className="muted">{f.notes}</div></div>})}</Card>}
